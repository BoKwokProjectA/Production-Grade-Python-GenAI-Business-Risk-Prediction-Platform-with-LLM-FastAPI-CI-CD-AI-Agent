name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    name: Lint, format, and test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      APP_NAME: ISIC2024-Flagship
      API_VERSION: v1
      MODEL_VERSION: 2024-ensemble-2models
      DEBUG: "False"
      DATABASE_URL: sqlite:///./test_isic.db
      SECRET_KEY: ci-test-secret-key
      POWER_AUTOMATE_URL: ""
      OPENAI_API_KEY: sk-ci-dummy-not-used
      CI: "true"
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch==2.3.1 torchvision==0.18.1 --index-url https://download.pytorch.org/whl/cpu
          python -m pip install -r requirements.txt
          python -m pip install pytest pytest-cov ruff black

      - name: Lint with Ruff
        run: ruff check src tests

      - name: Check formatting with Black
        run: black --check src tests

      - name: Run tests
        run: pytest -q
